<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Export - Survey Chilisaus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 40px 24px;">

<div style="max-width:820px; margin:0 auto;">

  <div style="margin-bottom:32px;">
    <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">
      Survey Chilisaus &mdash; Data Export
    </div>
    <h1 style="font-size:22px;margin-bottom:6px;">Verzamelde antwoorden</h1>
    <p style="font-size:13px;color:var(--text2);">
      Alle inzendingen zijn opgeslagen in de browser (localStorage) van dit apparaat.
      Gebruik de knoppen hieronder om de data te exporteren.
    </p>
  </div>

  <!-- Stat row -->
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px;">
    <div class="stat-card" style="min-width:120px;">
      <span class="val" id="countTotal">0</span>
      <span class="lbl">Inzendingen</span>
    </div>
    <div class="stat-card" style="min-width:120px;">
      <span class="val" id="countFirst">-</span>
      <span class="lbl">Eerste respons</span>
    </div>
    <div class="stat-card" style="min-width:120px;">
      <span class="val" id="countLast">-</span>
      <span class="lbl">Laatste respons</span>
    </div>
  </div>

  <!-- Actions -->
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;">
    <button class="btn btn-primary" onclick="downloadCSV()">Download CSV</button>
    <button class="btn btn-secondary" onclick="downloadJSON()">Download JSON</button>
    <button class="btn btn-secondary" onclick="loadTable()">Vernieuw tabel</button>
    <button class="btn btn-secondary" onclick="clearData()" style="margin-left:auto;color:var(--error);border-color:var(--error);">
      Wis alle data
    </button>
  </div>

  <!-- Table preview -->
  <div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);">
    <table id="previewTable" style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead id="previewHead"></thead>
      <tbody id="previewBody"></tbody>
    </table>
  </div>
  <p id="emptyMsg" style="text-align:center;color:var(--text3);padding:32px;display:none;">
    Nog geen inzendingen opgeslagen op dit apparaat.
  </p>

</div>

<script>
  const STORAGE_KEY = 'survey_chilisaus_responses';

  const CSV_HEADERS = [
    'response_id','timestamp',
    'q1','q2','q3','q4',
    'q5','q6','q7','q8','q9',
    'q10','q11','q12','q13','q14',
    'q15','q16','q17','q18',
    'q19','q20','q21','q22',
    'q23','q24','q25','q26','q27'
  ];

  function getResponses() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch (_) { return []; }
  }

  function csvField(val) {
    const s = (val === undefined || val === null) ? '' : String(val);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  function toCSV(responses) {
    const rows = [CSV_HEADERS.join(',')];
    for (const r of responses) {
      rows.push(CSV_HEADERS.map(h => csvField(r[h])).join(','));
    }
    return rows.join('\n');
  }

  function loadTable() {
    const responses = getResponses();
    const countEl = document.getElementById('countTotal');
    countEl.textContent = responses.length;

    if (responses.length === 0) {
      document.getElementById('emptyMsg').style.display = 'block';
      document.getElementById('previewTable').style.display = 'none';
      document.getElementById('countFirst').textContent = '-';
      document.getElementById('countLast').textContent = '-';
      return;
    }

    document.getElementById('emptyMsg').style.display = 'none';
    document.getElementById('previewTable').style.display = 'table';

    const first = responses[0].timestamp ? responses[0].timestamp.substring(0,10) : '-';
    const last  = responses[responses.length-1].timestamp ? responses[responses.length-1].timestamp.substring(0,10) : '-';
    document.getElementById('countFirst').textContent = first;
    document.getElementById('countLast').textContent = last;

    // Header row
    const thRow = CSV_HEADERS.map(h =>
      `<th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2);">${h}</th>`
    ).join('');
    document.getElementById('previewHead').innerHTML = `<tr>${thRow}</tr>`;

    // Data rows (max 50 shown)
    const shown = responses.slice(-50);
    const bodyRows = shown.map(r => {
      const cells = CSV_HEADERS.map(h => {
        const v = r[h] !== undefined ? r[h] : '';
        return `<td style="padding:7px 10px;border-bottom:1px solid rgba(46,53,80,0.3);color:var(--text);white-space:nowrap;">${String(v).substring(0,40)}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    });
    document.getElementById('previewBody').innerHTML = bodyRows.join('');
  }

  function downloadCSV() {
    const responses = getResponses();
    if (responses.length === 0) { alert('Geen data om te exporteren.'); return; }
    const csv = toCSV(responses);
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `survey_chilisaus_${new Date().toISOString().substring(0,10)}.csv`;
    a.click();
  }

  function downloadJSON() {
    const responses = getResponses();
    if (responses.length === 0) { alert('Geen data om te exporteren.'); return; }
    const blob = new Blob([JSON.stringify(responses, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `survey_chilisaus_${new Date().toISOString().substring(0,10)}.json`;
    a.click();
  }

  function clearData() {
    const n = getResponses().length;
    if (n === 0) { alert('Er is geen data om te wissen.'); return; }
    if (!confirm(`Weet u zeker dat u alle ${n} inzendingen wilt verwijderen? Dit kan niet ongedaan worden gemaakt.`)) return;
    localStorage.removeItem(STORAGE_KEY);
    loadTable();
  }

  loadTable();
</script>

</body>
</html>
